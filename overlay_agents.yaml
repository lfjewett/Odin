agents:
- spec_version: ACP-0.4.0
  agent_url: http://localhost:8010
  agent_id: price_agent
  agent_name: Price Data
  agent_version: 1.0.0
  description: Live OHLCV candle data with bar_state lifecycle
  agent_type: price
  config_schema:
    candle_type: candlestick
    ticker: follow_chart
    interval: follow_chart
    show_volume: true
  outputs:
  - output_id: price.ohlc
    schema: ohlc
    label: Price Candles
    is_primary: true
  transport_limits:
    max_records_per_chunk: 5000
    max_websocket_message_bytes: 10485760
    chunk_timeout_seconds: 30
- spec_version: ACP-0.4.1
  agent_url: http://localhost:8020
  agent_id: odin_indicator_agent__atr
  agent_name: ATR
  agent_version: 0.1.0
  description: Wilder-smoothed Average True Range. Supports traditional (all candles),
    rth_only (US equity regular trading hours only), and hybrid_chunked (blends current-session
    RTH ATR with historical per-chunk expected volatility).
  agent_type: indicator
  config_schema:
    aggregation_interval: 1m
    length: 14
    mode: rth_only
    lookback_sessions: 20
    chunk_minutes: 30
    visible: true
    force_subgraph: true
    line_color: '#22c55e'
  outputs:
  - &id001
    output_id: atr.line
    schema: line
    label: ATR
    is_primary: true
  transport_limits:
    max_records_per_chunk: 5000
    max_websocket_message_bytes: 10485760
    chunk_timeout_seconds: 30
  indicators:
  - indicator_id: sma
    name: Simple Moving Average
    description: Simple moving average over close price
    params_schema:
      period:
        type: integer
        description: Simple moving average period
        required: false
        default: 20
        min: 1
        max: 500
      aggregation_interval:
        type: string
        description: Optional higher timeframe for indicator computation derived from
          source interval (for example 2m from 1m)
        required: false
        enum:
        - 10m
        - 12h
        - 15m
        - 1M
        - 1d
        - 1h
        - 1m
        - 1w
        - 20m
        - 2d
        - 2h
        - 2m
        - 30m
        - 3m
        - 4h
        - 4m
        - 5m
        - 8h
    outputs:
    - output_id: sma.line
      schema: line
      label: SMA
      is_primary: true
  - indicator_id: kama
    name: Kaufman's Adaptive Moving Average
    description: Adaptive moving average over close price using efficiency ratio and
      fast/slow smoothing constants
    params_schema:
      efficiency_ratio_length:
        type: integer
        description: Periods used to compute the efficiency ratio
        required: false
        default: 10
        min: 1
        max: 500
      fast_length:
        type: integer
        description: Fast EMA-equivalent period used in the KAMA smoothing constant
        required: false
        default: 2
        min: 1
        max: 500
      slow_length:
        type: integer
        description: Slow EMA-equivalent period used in the KAMA smoothing constant
        required: false
        default: 30
        min: 1
        max: 500
      aggregation_interval:
        type: string
        description: Optional higher timeframe for indicator computation derived from
          source interval (for example 2m from 1m)
        required: false
        enum:
        - 10m
        - 12h
        - 15m
        - 1M
        - 1d
        - 1h
        - 1m
        - 1w
        - 20m
        - 2d
        - 2h
        - 2m
        - 30m
        - 3m
        - 4h
        - 4m
        - 5m
        - 8h
    outputs:
    - output_id: kama.line
      schema: line
      label: KAMA
      is_primary: true
  - indicator_id: atr
    name: Average True Range
    description: Wilder-smoothed Average True Range. Supports traditional (all candles),
      rth_only (US equity regular trading hours only), and hybrid_chunked (blends
      current-session RTH ATR with historical per-chunk expected volatility).
    params_schema:
      length:
        type: integer
        description: ATR period (number of True Range values in the Wilder seed window)
        required: false
        default: 14
        min: 1
        max: 500
      mode:
        type: string
        description: 'Computation mode: ''traditional'' uses all candles; ''rth_only''
          uses US equity RTH candles only (Mon-Fri 09:30-16:00 ET); ''hybrid_chunked''
          blends RTH ATR with historical per-30-minute-chunk expected volatility.'
        required: false
        default: traditional
        enum:
        - traditional
        - rth_only
        - hybrid_chunked
      lookback_sessions:
        type: integer
        description: 'For hybrid_chunked mode: number of prior RTH sessions used to
          compute each 30-minute chunk''s expected volatility.'
        required: false
        default: 20
        min: 1
        max: 500
      chunk_minutes:
        type: integer
        description: RTH chunk size in minutes (fixed at 30 for this release).
        required: false
        default: 30
        enum:
        - 30
      aggregation_interval:
        type: string
        description: Optional higher timeframe for indicator computation derived from
          source interval
        required: false
        enum:
        - 10m
        - 12h
        - 15m
        - 1M
        - 1d
        - 1h
        - 1m
        - 1w
        - 20m
        - 2d
        - 2h
        - 2m
        - 30m
        - 3m
        - 4h
        - 4m
        - 5m
        - 8h
    outputs:
    - *id001
  selected_indicator_id: atr
